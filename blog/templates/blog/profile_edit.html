{% extends "blog/base.html" %}
{% load static %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="profile-container">
    <h1>Редактирование профиля</h1>
    
    <form method="post" enctype="multipart/form-data" class="profile-form">
        {% csrf_token %}
        
        <div class="form-group">
            <label for="first_name">Имя:</label>
            <input type="text" name="first_name" id="first_name" value="{{ user.first_name }}" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="last_name">Фамилия:</label>
            <input type="text" name="last_name" id="last_name" value="{{ user.last_name }}" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" value="{{ user.email }}" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="phone">Телефон:</label>
            <input type="text" name="phone" id="phone" value="{{ user.phone|default:'' }}" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="company_name">Компания:</label>
            <input type="text" name="company_name" id="company_name" value="{{ user.company_name|default:'' }}" class="form-input">
        </div>
        
        <div class="form-group">
            <label for="avatar">Аватар:</label>
            <input type="file" name="avatar" id="avatar" accept="image/*">
            {% if user.avatar %}
                <p>Текущий аватар: <img src="{{ user.avatar.url }}" width="50"></p>
            {% endif %}
        </div>
        
        <button type="submit" class="btn">Сохранить</button>
        <a href="{% url 'blog:profile' %}" class="btn">Отмена</a>
    </form>
</div>
{% endblock %}
