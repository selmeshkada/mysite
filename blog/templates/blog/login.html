<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | ФИН</title>
    <link rel="stylesheet" href="/static/css/login.css?v=2">
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo">
                <div class="logo-box"><img src="/static/blog/images/logo_FIN.svg" alt="logo"></div>
            </div>
        </header>

        <main class="main-content">
            <div class="registration-container">
                <!-- Добавили action и method -->
                <form class="registration-form" method="post" action="{% url 'blog:login' %}">
                    <form class="registration-form" method="post" action="{% url 'blog:login' %}">
                        {% csrf_token %}
                        <h1 class="registration-title">Вход</h1>

                        <!-- Поля email и password -->
                        <div class="form-group">
                            <label for="id_username">Email</label>
                            <input type="text" name="username" id="id_username" class="form-input"
                                placeholder="email@example.com" value="{{ form.username.value|default:'' }}">
                        </div>

                        <div class="form-group">
                            <label for="id_password">Пароль</label>
                            <input type="password" name="password" id="id_password" class="form-input"
                                placeholder="••••••••">
                        </div>

                        <!-- СТИЛИЗОВАННЫЙ Django-чекбокс -->
                        <div class="remember">
                            <div class="checkbox-group">
                                {{ form.remember_me }} <!-- Это сам чекбокс -->
                                <label for="{{ form.remember_me.id_for_label }}">Запомнить меня</label>
                            </div>
                        </div>

                        <button type="submit" class="register-btn">Продолжить</button>

                        <!-- остальная часть формы -->
                        <div class="divider"><span>Или войдите через:</span></div>
                        <!-- ... соцсети и ссылки ... -->

                        <div class="social-login">
                            <button type="button" class="social-btn">
                                <img src="/static/blog/images/google.svg" alt="Google" class="social-icon">
                                Google
                            </button>
                            <button type="button" class="social-btn">
                                <img src="/static/blog/images/gosuslugi.svg" alt="Email" class="social-icon">
                                Госуслуги
                            </button>
                            <button type="button" class="social-btn">
                                <img src="/static/blog/images/vk.svg" alt="VK" class="social-icon">
                                ВК
                            </button>
                        </div>

                        <div class="login-link">
                            Нет аккаунта? <a href="{% url 'blog:reg' %}">Зарегистрируйтесь</a>
                        </div>
                    </form>
            </div>
        </main>

        <footer class="footer">
            <div class="podpiska">
                <div class="logo-box-fotter"><img src="/static/blog/images/logo_grey.svg" alt="logo"></div>
                <div class="input-rassilka">
                    <input type="email" id="email" class="form-input" placeholder="Получайте актуальную информацию">
                    <button>Подписаться</button>
                </div>
            </div>
            <div class="footer-content">
                <div class="nav-links">
                    <h3>Информация:</h3>
                    <p><a href="#">О сервисе</a></p>
                    <p><a href="#">Тарифы</a></p>
                    <p><a href="#">Справочная</a></p>
                    <p><a href="#">Поддержка</a></p>
                </div>
                <div class="footer-contacts">
                    <h3>Контакты</h3>
                    <p>Телефон: +7 (499) 605-20-00</p>
                    <p>Email: fin@gmail.com</p>
                </div>
                <div class="footer-social">
                    <div class="apps"><img src="/static/blog/images/app_store.svg" alt="app">
                        <img src="/static/blog/images/google_play.svg" alt="google_play">
                    </div>
                    <div class="social-links">
                        <h3>Соцсети:</h3>
                        <div class="social-icons">
                            <div class="icon"><img src="/static/blog/images/rutube.svg" alt="rutube"></div>
                            <div class="icon"><img src="/static/blog/images/tg.svg" alt="tg"></div>
                            <div class="icon"><img src="/static/blog/images/vk_white.svg" alt="vk_white"></div>
                            <div class="icon"><img src="/static/blog/images/yandex_zen.svg" alt="zen"></div>
                        </div>
                    </div>

                </div>
            </div>
            <div class="prava">@ Все права защищены.</div>
        </footer>
    </div>
</body>

</html>
